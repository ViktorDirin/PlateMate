<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Viewport definition for mobile-first PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateMate</title>
    <link rel="stylesheet" href="style.css">
    <!-- Theme color for PWA -->
    <meta name="theme-color" content="#f8f9fa">
    <link rel="icon" type="image/png" href="icon.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icon.png">
</head>

<body>
    <div id="app">
        <!-- Main Screen -->
        <main id="main-screen" class="screen active">
            <header class="app-header">
                <h1>PlateMate</h1>
                <div style="display: flex; gap: 8px;">
                    <div id="sync-status-icon" class="icon-btn" aria-label="Sync Status" style="color: #dc3545; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                        </svg>
                    </div>
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </header>
            <div class="content">
                <ul id="plan-list" class="card-list">
                    <!-- Diet plans will be rendered here dynamically -->
                </ul>
                <button id="add-plan-btn" class="fab" aria-label="Add Plan">
                    <!-- Plus Icon -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Plan Details Screen (Categories) -->
        <main id="plan-screen" class="screen">
            <header class="app-header">
                <button id="back-btn" class="icon-btn" aria-label="Back">
                    <!-- Back Icon -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 id="plan-title">Plan Name</h1>
            </header>
            <div class="content">
                <div style="margin-bottom: 24px; text-align: center;">
                    <button id="guidelines-btn" class="btn btn-secondary" style="width: 100%;">Diet Guidelines</button>
                </div>

                <!-- NEW: Date Planning Section -->
                <div class="planner-section card" style="margin-bottom: 24px;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3 style="margin: 0; font-size: 1.125rem;">Schedule</h3>
                    </div>

                    <button id="open-date-picker-btn" class="btn btn-primary"
                        style="width: 100%; margin-bottom: 16px; padding: 16px; font-size: 1.1rem;">Plan a Day</button>

                    <div id="active-planning-controls"
                        style="display: none; margin-bottom: 16px; padding: 12px; background: var(--gray-light); border-radius: 12px; text-align: center;">
                        <p style="margin-bottom: 8px; font-weight: 600;">Planning for: <span
                                id="active-planning-date-display"></span></p>
                        <div style="display: flex; gap: 8px;">
                            <button id="cancel-planning-btn" class="btn btn-secondary" style="flex: 1;">Cancel</button>
                            <button id="confirm-menu-btn" class="btn btn-primary" style="flex: 2;">Confirm Menu</button>
                        </div>
                    </div>

                    <div id="scheduled-dates-list" style="display: flex; flex-direction: column; gap: 8px;">
                        <!-- Rendered list of saved dates -->
                    </div>
                </div>

                <div id="categories-container" class="categories">
                    <!-- Diet categories (Breakfast, Lunch, etc.) will be rendered here -->
                </div>
                <button id="add-category-btn" class="btn btn-secondary"
                    style="width: 100%; margin-top: 16px; margin-bottom: 24px;">+ Add Category</button>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-plan-modal" class="modal">
        <div class="modal-content card">
            <h2>New Diet Plan</h2>
            <input type="text" id="new-plan-name" placeholder="Plan Name" />
            <div class="modal-actions">
                <button id="cancel-plan-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-plan-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="add-category-modal" class="modal">
        <div class="modal-content card">
            <h2>New Category</h2>
            <input type="text" id="new-category-name" placeholder="Category Name (e.g. Snack)" />
            <div class="modal-actions">
                <button id="cancel-category-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-category-btn" class="btn btn-primary">Add</button>
            </div>
        </div>
    </div>

    <!-- Guidelines Modal -->
    <div id="guidelines-modal" class="modal">
        <div class="modal-content card" style="max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">Diet Guidelines</h2>
                <div style="display: flex; gap: 8px;">
                    <button id="edit-guidelines-btn" class="icon-btn" aria-label="Edit"
                        style="color: var(--primary-blue);">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                    <button id="close-guidelines-btn" class="icon-btn" aria-label="Close">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="guidelines-display" style="line-height: 1.6; white-space: pre-wrap;">
                <!-- Rendered dynamically -->
            </div>

            <textarea id="guidelines-editor"
                style="display: none; width: 100%; padding: 12px; border: 1px solid var(--gray-light); border-radius: 8px; font-family: inherit; resize: vertical;"
                rows="8"></textarea>

            <div id="guidelines-actions" style="display: none; justify-content: flex-end; gap: 12px; margin-top: 16px;">
                <button id="cancel-guidelines-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-guidelines-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Daily Menu Modal -->
    <div id="daily-menu-modal" class="modal">
        <div class="modal-content card" style="max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;" id="daily-menu-title">Menu</h2>
                <button id="close-daily-menu-btn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="daily-menu-content" style="margin-bottom: 20px;"></div>
            <button id="generate-shopping-btn" class="btn btn-primary" style="width: 100%;">Generate Shopping
                List</button>
        </div>
    </div>

    <!-- Shopping List Modal -->
    <div id="shopping-list-modal" class="modal">
        <div class="modal-content card" style="max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">Shopping List</h2>
                <button id="close-shopping-list-btn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <ul id="shopping-list-content" style="padding-left: 20px; line-height: 1.6; margin-bottom: 20px;"></ul>
            <button id="copy-shopping-btn" class="btn btn-primary" style="width: 100%;">Copy to Clipboard</button>
        </div>
    </div>

    <!-- Date Picker Modal -->
    <div id="date-picker-modal" class="modal">
        <div class="modal-content card">
            <h2>Select Date</h2>
            <input type="date" id="plan-date-input"
                style="width: 100%; padding: 12px; border: 1px solid var(--gray-light); border-radius: 8px; margin-bottom: 20px; font-size: 1rem; font-family: inherit; text-align: center;" />
            <div class="modal-actions">
                <button id="cancel-date-btn" class="btn btn-secondary">Cancel</button>
                <button id="plan-date-btn" class="btn btn-primary">Start Planning</button>
            </div>
        </div>
    </div>

    <!-- Edit Meal Modal -->
    <div id="edit-meal-modal" class="modal">
        <div class="modal-content card" style="max-height: 80vh; overflow-y: auto;">
            <h2>Edit Meal</h2>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Meal Description</label>
            <textarea id="edit-meal-text" rows="3"
                style="width: 100%; padding: 12px; border: 1px solid var(--gray-light); border-radius: 8px; margin-bottom: 16px; font-family: inherit; resize: vertical;"></textarea>

            <label style="display: block; margin-bottom: 4px; font-weight: 600;">Ingredients List</label>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 8px;">Format: Item: Amount Unit (e.g., Milk: 100
                ml)</p>
            <textarea id="edit-meal-ingredients" rows="4"
                style="width: 100%; padding: 12px; border: 1px solid var(--gray-light); border-radius: 8px; margin-bottom: 16px; font-family: inherit; resize: vertical;"></textarea>

            <input type="hidden" id="edit-meal-category" />
            <input type="hidden" id="edit-meal-id" />

            <div class="modal-actions" style="display: flex; gap: 8px;">
                <button id="delete-meal-btn" class="btn"
                    style="background-color: #dc3545; color: white; margin-right: auto; padding: 12px 16px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: -3px;">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
                <button id="cancel-edit-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-edit-btn" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
