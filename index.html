<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport definition for mobile-first PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlateMate</title>
    <link rel="stylesheet" href="style.css">
    <!-- Theme color for PWA -->
    <meta name="theme-color" content="#f8f9fa">
</head>
<body>
    <div id="app">
        <!-- Main Screen -->
        <main id="main-screen" class="screen active">
            <header class="app-header">
                <h1>PlateMate</h1>
            </header>
            <div class="content">
                <ul id="plan-list" class="card-list">
                    <!-- Diet plans will be rendered here dynamically -->
                </ul>
                <button id="add-plan-btn" class="fab" aria-label="Add Plan">
                    <!-- Plus Icon -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Plan Details Screen (Categories) -->
        <main id="plan-screen" class="screen">
            <header class="app-header">
                <button id="back-btn" class="icon-btn" aria-label="Back">
                    <!-- Back Icon -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 id="plan-title">Plan Name</h1>
            </header>
            <div class="content">
                <div id="categories-container" class="categories">
                    <!-- Diet categories (Breakfast, Lunch, etc.) will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-plan-modal" class="modal">
        <div class="modal-content card">
            <h2>New Diet Plan</h2>
            <input type="text" id="new-plan-name" placeholder="Plan Name" />
            <div class="modal-actions">
                <button id="cancel-plan-btn" class="btn btn-secondary">Cancel</button>
                <button id="save-plan-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
